<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MC Ping</title>
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="./style.css">
</head>
<body>
<div id="mc-status-card">
    <h1 id="server-name" style="margin-top: 0;">Načítavam...</h1>
    <img id="server-icon" src="" alt="" style="width: 64px; height: 64px;">
    <p>Stav: <strong id="status-text">Načítavam...</strong></p>
    <p>Hráči: <span id="player-count">-</span></p>
    <p>Motd: <span id="server-motd">-</span></p>
    <p>Kto je online:</p>
    <ul id="player-list">-</ul>
    <p>Verzia: <span id="server-version">-</span></p>
</div>
<button onclick="window.location.href = './lobby.html'">Back</button>
<script src="./ping.js"></script>
<script>
    // Set title to include server ip via name
    const ip = new URLSearchParams(window.location.search).get('ip');
    document.title = document.title + ' - ' + ip;
</script>
<section>
    <footer id="site-footer" style="height: 5vh;">
        <p><marquee scrollamount="8" direction="left">API avibable at <span id="hostipheree"></span>:3000/ping. Usage <span id="hostiphereee"></span>:3000/ping?ip=The ip&port=The port. This will return an json of ping via handshake.</p></marquee>
        <script>
        // modify bottom text to contain valid info about open api
        GETMYF_IN_HOSTS('hostipheree');
        GETMYF_IN_HOSTS('hostiphereee');
        function GETMYF_IN_HOSTS(helloguy){
            document.getElementById(helloguy).innerText = window.location.hostname;
        }
        </script>
    </footer>
</section>
</body>
</html>
